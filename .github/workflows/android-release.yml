name: Despliegue Android por Etiquetas (Tags)

on:
  push:
    tags:
      - 'v*'

jobs:
  distribute:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del proyecto
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Instalar Dependencias de JavaScript
        run: npm ci

      - name: Generar Bundle de Expo
        run: npx expo export:embed --platform android --dev false --bundle-output android/app/src/main/assets/index.android.bundle --assets-dest android/app/src/main/res/

      - name: Reconstruir Keystore de producción
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/mi-clave-subida.keystore

      - name: Reconstruir JSON de Google Play
        run: |
          echo "${{ secrets.GOOGLE_PLAY_API_JSON }}" | base64 --decode > android/app/google-play-key.json

      - name: Configurar Fastlane y Desplegar
        working-directory: android
        env:
          MYAPP_RELEASE_STORE_FILE: "${{ github.workspace }}/android/app/mi-clave-subida.keystore"
          MYAPP_RELEASE_KEY_ALIAS: "${{ secrets.ANDROID_KEY_ALIAS }}"
          MYAPP_RELEASE_STORE_PASSWORD: "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          MYAPP_RELEASE_KEY_PASSWORD: "${{ secrets.ANDROID_KEY_PASSWORD }}"
          # Forzamos el número que necesites subir a Google Play
          NEW_VERSION_CODE: "151"
          NEW_VERSION_NAME: "1.0.2"
        run: |
          echo 'source "https://rubygems.org"' > Gemfile
          echo 'gem "fastlane"' >> Gemfile
          
          mkdir -p fastlane
          cat << 'EOF' > fastlane/Fastfile
          default_platform(:android)

          platform :android do
            desc "Compilar y subir version a prueba interna"
            lane :upload_internal do
              gradle(
                task: "bundle",
                build_type: "Release",
                properties: {
                  "MYAPP_RELEASE_STORE_FILE" => ENV["MYAPP_RELEASE_STORE_FILE"],
                  "MYAPP_RELEASE_STORE_PASSWORD" => ENV["MYAPP_RELEASE_STORE_PASSWORD"],
                  "MYAPP_RELEASE_KEY_ALIAS" => ENV["MYAPP_RELEASE_KEY_ALIAS"],
                  "MYAPP_RELEASE_KEY_PASSWORD" => ENV["MYAPP_RELEASE_KEY_PASSWORD"],
                  "NEW_VERSION_CODE" => ENV["NEW_VERSION_CODE"],
                  "NEW_VERSION_NAME" => ENV["NEW_VERSION_NAME"]
                }
              )
              upload_to_play_store(
                track: "internal",
                json_key: "app/google-play-key.json",
                package_name: "org.universalworldtechnologyec.nutrihabitoccmovil"
              )
            end
          end
          EOF
          
          export GEM_HOME=$HOME/.gems
          export PATH=$GEM_HOME/bin:$PATH
          gem install bundler -N
          
          bundle config set --local path 'vendor/bundle'
          bundle install
          
          bundle exec fastlane upload_internal